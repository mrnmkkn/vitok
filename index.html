<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Метод Витка — тёмная карта предназначения</title>
<style>
  :root{
    --bg0:#080610;
    --bg1:#171024;
    --bg2:#2a1837;
    --ink:#f8f0e6;
    --muted:#bfaec8;
    --soft:#7f6a90;
    --line:rgba(226,206,236,.33);
    --lineStrong:rgba(250,236,218,.78);
    --gold:#d6b16b;
    --gold2:#f1d89a;
    --violet:#a889c7;
    --card:rgba(255,248,236,.055);
    --card2:rgba(255,248,236,.12);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 50% -10%, rgba(178,116,206,.36) 0 12%, transparent 42%),
      radial-gradient(circle at 12% 18%, rgba(214,177,107,.13) 0 10%, transparent 34%),
      radial-gradient(circle at 88% 28%, rgba(91,48,128,.42) 0 11%, transparent 36%),
      radial-gradient(circle at 50% 92%, rgba(214,177,107,.10) 0 7%, transparent 38%),
      linear-gradient(160deg,var(--bg0),var(--bg1) 45%,var(--bg2));
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    color:var(--ink);
    padding:34px 24px;
  }
  .wrap{
    max-width:1040px;
    margin:0 auto;
    padding:30px 34px 26px;
    border-radius:34px;
    position:relative;
    overflow:hidden;
    background:
      linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.025)),
      radial-gradient(circle at 50% 18%,rgba(255,244,214,.08),transparent 45%);
    border:1px solid rgba(255,239,214,.16);
    box-shadow:0 34px 120px rgba(0,0,0,.38), inset 0 0 0 1px rgba(255,255,255,.035);
  }
  .wrap::before{
    content:"";
    position:absolute;
    inset:16px;
    border-radius:24px;
    border:1px solid rgba(214,177,107,.18);
    pointer-events:none;
  }
  .wrap::after{
    content:"";
    position:absolute;
    width:420px;height:420px;
    right:-160px;top:-180px;
    border-radius:50%;
    border:1px solid rgba(214,177,107,.15);
    box-shadow:0 0 0 42px rgba(214,177,107,.025),0 0 0 86px rgba(168,137,199,.025);
    pointer-events:none;
  }
  h1{
    margin:0 0 6px;
    font-family:Georgia,"Times New Roman",serif;
    font-size:46px;
    font-weight:500;
    line-height:1.04;
    letter-spacing:-.035em;
    color:#fff2df;
  }
  .subtitle{
    margin:0 0 22px;
    color:rgba(239,223,241,.66);
    font-size:14px;
    letter-spacing:.22em;
    text-transform:uppercase;
  }
  .controls{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:18px;
    position:relative;
    z-index:2;
  }
  input[type="date"]{
    background:rgba(255,248,236,.08);
    border:1px solid rgba(255,236,205,.18);
    border-radius:999px;
    padding:14px 18px;
    font-size:17px;
    min-width:260px;
    color:var(--ink);
    color-scheme:dark;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 18px 40px rgba(0,0,0,.16);
  }
  button{
    background:linear-gradient(135deg,#e4c177,#8f6128);
    color:#170e18;
    border:none;
    padding:14px 22px;
    border-radius:999px;
    font-size:17px;
    font-weight:750;
    cursor:pointer;
    box-shadow:0 14px 34px rgba(214,177,107,.18), inset 0 1px 0 rgba(255,255,255,.35);
  }
  button:hover{ transform:translateY(-1px); }
  svg{ width:100%; height:650px; display:block; position:relative; z-index:1; overflow:visible; }
  .ornament{ fill:none; stroke:rgba(214,177,107,.16); stroke-width:1.2; stroke-linecap:round; }
  .ornament2{ fill:none; stroke:rgba(226,206,236,.11); stroke-width:1; stroke-dasharray:2 10; stroke-linecap:round; }
  .star{ fill:rgba(241,216,154,.62); }
  .arc{ fill:none; stroke:var(--lineStrong); stroke-width:2.15; stroke-linecap:round; filter:drop-shadow(0 0 6px rgba(250,236,218,.10)); }
  .arc.soft{ stroke:rgba(214,177,107,.42); stroke-width:1.85; stroke-dasharray:3 9; stroke-linecap:round; }
  .num{
    font-family:"Avenir Next","Segoe UI",Arial,sans-serif;
    font-variant-numeric:tabular-nums lining-nums;
    font-feature-settings:"tnum" 1,"lnum" 1;
    font-size:22px;
    text-anchor:middle;
    dominant-baseline:middle;
    font-weight:720;
    fill:#fff4e2;
    paint-order:stroke;
    stroke:rgba(8,6,16,.70);
    stroke-width:3px;
  }
  .num.small{ font-size:17px; font-weight:700; fill:#f7ead8; }
  .portraitHalo{ fill:rgba(255,248,236,.055); stroke:rgba(255,239,214,.16); stroke-width:1; }
  .dateText{
    font-family:"Avenir Next","Segoe UI",Arial,sans-serif;
    font-size:14px;
    letter-spacing:.30em;
    text-anchor:middle;
    dominant-baseline:middle;
    fill:rgba(248,240,230,.70);
    font-weight:700;
  }
  .ageText{ font-size:13px; text-anchor:middle; dominant-baseline:middle; fill:rgba(191,174,200,.68); font-weight:650; }
  .sep{ stroke:rgba(226,206,236,.22); stroke-width:1; stroke-dasharray:1 6; stroke-linecap:round; }
  .cycleCircle{ fill:rgba(255,248,236,.045); stroke:rgba(226,206,236,.42); stroke-width:1.65; }
  .challengeSquare{ fill:rgba(255,248,236,.035); stroke:rgba(214,177,107,.38); stroke-width:1.65; rx:9; }
  .destinyLine{ stroke:rgba(214,177,107,.92); stroke-width:2.05; stroke-dasharray:2 8; fill:none; stroke-linecap:round; stroke-linejoin:round; filter:drop-shadow(0 0 8px rgba(214,177,107,.18)); }
  .destinyCircle{ fill:rgba(214,177,107,.10); stroke:rgba(241,216,154,.92); stroke-width:1.9; filter:drop-shadow(0 0 12px rgba(214,177,107,.22)); }
  .destinyHalo{ fill:rgba(214,177,107,.055); stroke:rgba(214,177,107,.14); stroke-width:1; }
  .hint{ margin-top:8px; color:rgba(191,174,200,.66); font-size:13px; }
  @media(max-width:720px){ body{padding:18px 12px;} .wrap{padding:22px 14px 18px;border-radius:26px;} h1{font-size:34px;} .controls{flex-direction:column;align-items:stretch;} input[type="date"],button{width:100%;} svg{height:590px;} }
</style>
</head>
<body>
<div class="wrap">
  <h1>Метод Витка</h1>
  <p class="subtitle">личная карта пути</p>
  <div class="controls">
    <input type="date" id="birth" />
    <button id="btn">Построить виток</button>
  </div>
  <svg viewBox="0 0 980 650" id="svg"></svg>
  <div class="hint">Портрет личности — сверху, дата — по центру, путь жизни и циклы — снизу.</div>
</div>
<script>
function arc22(n){ const r = n % 22; return r === 0 ? 22 : r; }
function sumDigits(n){ return n.toString().split('').reduce((a,b)=>a+Number(b),0); }
function reduce1(n){ let x = Math.abs(Number(n)); while (x > 9) x = sumDigits(x); return x; }
function pad2(n){ return String(n).padStart(2,'0'); }
function pad4(n){ return String(n).padStart(4,'0'); }
function line(svg, x1,y1,x2,y2, cls="sep"){ svg.insertAdjacentHTML("beforeend",`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${cls}"></line>`); }
function text(svg, x,y, str, cls="num"){ svg.insertAdjacentHTML("beforeend",`<text x="${x}" y="${y}" class="${cls}">${str}</text>`); }
function path(svg, d, cls="arc"){ svg.insertAdjacentHTML("beforeend",`<path d="${d}" class="${cls}"></path>`); }
function circle(svg, cx,cy,r, cls="cycleCircle"){ svg.insertAdjacentHTML("beforeend",`<circle cx="${cx}" cy="${cy}" r="${r}" class="${cls}"></circle>`); }
function rect(svg, x,y,w,h, cls="challengeSquare"){ svg.insertAdjacentHTML("beforeend",`<rect x="${x}" y="${y}" width="${w}" height="${h}" class="${cls}"></rect>`); }
function halo(svg,cx,cy,r,cls){ svg.insertAdjacentHTML("beforeend",`<circle cx="${cx}" cy="${cy}" r="${r}" class="${cls}"></circle>`); }
function render(){
  const svg = document.getElementById("svg");
  svg.innerHTML = `
    <circle cx="490" cy="305" r="260" fill="none" stroke="rgba(255,248,236,.055)" stroke-width="1"/>
    <circle cx="490" cy="305" r="188" fill="none" stroke="rgba(214,177,107,.075)" stroke-width="1"/>
    <circle cx="490" cy="305" r="112" fill="none" stroke="rgba(226,206,236,.055)" stroke-width="1"/>
    <path d="M118 98 C245 42 360 50 468 112" class="ornament"/>
    <path d="M134 120 C255 72 350 78 446 130" class="ornament2"/>
    <path d="M632 94 C748 135 818 216 852 336" class="ornament"/>
    <path d="M636 124 C734 164 786 236 812 342" class="ornament2"/>
    <path d="M306 612 C410 642 570 642 674 612" class="ornament"/>
    <g class="star">
      <circle cx="250" cy="92" r="1.7"/><circle cx="734" cy="154" r="1.9"/><circle cx="826" cy="396" r="1.6"/>
      <circle cx="214" cy="470" r="1.5"/><circle cx="704" cy="574" r="1.8"/><circle cx="126" cy="270" r="1.6"/>
      <circle cx="386" cy="78" r="1.3"/><circle cx="604" cy="78" r="1.4"/><circle cx="768" cy="494" r="1.4"/>
    </g>`;
  const iso = document.getElementById("birth").value;
  if (!iso) return;
  const dt = new Date(iso + "T12:00:00");
  const day = dt.getDate();
  const month = dt.getMonth()+1;
  const year = dt.getFullYear();
  const A_day = arc22(day);
  const A_month = arc22(month);
  const A_year = arc22(year);
  const B_left = arc22(A_day + A_month);
  const B_right = arc22(A_month + A_year);
  const C_top = arc22(B_left + B_right);
  const centerX = 490;
  const yA = 255;
  const yB = 180;
  const yC = 105;
  const xA1 = centerX - 170;
  const xA2 = centerX;
  const xA3 = centerX + 170;
  const xB1 = centerX - 95;
  const xB2 = centerX + 95;
  const liftLow = 95;
  const spanLow = (xA2 - xA1);
  const spanUp  = (xB2 - xB1);
  const liftUp  = Math.round(liftLow * (spanUp / spanLow));
  path(svg, `M ${xA1} ${yA-10} Q ${centerX-85} ${yA-liftLow} ${xA2} ${yA-10}`, "arc");
  path(svg, `M ${xA2} ${yA-10} Q ${centerX+85} ${yA-liftLow} ${xA3} ${yA-10}`, "arc");
  path(svg, `M ${xB1} ${yB-10} Q ${centerX} ${yB-liftUp} ${xB2} ${yB-10}`, "arc soft");
  [[xA1,yA+10,23],[xA2,yA+10,23],[xA3,yA+10,23],[xB1,yB+8,21],[xB2,yB+8,21],[centerX,yC,24]].forEach(([x,y,r]) => halo(svg,x,y,r,"portraitHalo"));
  text(svg, xA1, yA+10, A_day, "num");
  text(svg, xA2, yA+10, A_month, "num");
  text(svg, xA3, yA+10, A_year, "num");
  text(svg, xB1, yB+8, B_left, "num");
  text(svg, xB2, yB+8, B_right, "num");
  text(svg, centerX, yC, C_top, "num");
  const digitsForDestiny = `${pad2(day)}${pad2(month)}${pad4(year)}`.split("").map(Number);
  const destinyBase = reduce1(digitsForDestiny.reduce((a,b)=>a+b,0));
  const destinyYear = arc22(destinyBase + A_year);
  const destinyMiddle = arc22(destinyYear + B_right);
  const destinyTop = arc22(destinyMiddle + C_top);
  const destiny = [destinyBase, destinyYear, destinyMiddle, destinyTop];
  const destinyPoints = [
    { x: xA3 + 92, y: yA + 10 },
    { x: xB2 + 92, y: yB + 8 },
    { x: centerX + 92, y: yC },
    { x: centerX + 46, y: yC - 72 }
  ];
  const destinyD = `M ${destinyPoints[0].x} ${destinyPoints[0].y}
                    Q ${centerX+214} ${yA-10} ${destinyPoints[1].x} ${destinyPoints[1].y}
                    Q ${centerX+164} ${yB-15} ${destinyPoints[2].x} ${destinyPoints[2].y}
                    Q ${centerX+88} ${yC-10} ${destinyPoints[3].x} ${destinyPoints[3].y}`;
  path(svg, destinyD, "destinyLine");
  for (let i=0;i<destiny.length;i++){
    const p = destinyPoints[i];
    const r = i === destiny.length - 1 ? 24 : 19;
    halo(svg, p.x, p.y, r+8, "destinyHalo");
    circle(svg, p.x, p.y, r, "destinyCircle");
    text(svg, p.x, p.y, destiny[i], i === destiny.length - 1 ? "num" : "num small");
  }
  const dd = pad2(day); const mm = pad2(month); const yyyy = pad4(year);
  text(svg, centerX, 325, `${dd} · ${mm} · ${yyyy}`, "dateText");
  const digitsStr = `${dd}${mm}${yyyy}`;
  const digits = digitsStr.split("").map(Number);
  const life = [digits[0]];
  for (let i=1;i<digits.length;i++){ let next = life[i-1] + digits[i]; if (next > 22) next -= 22; life.push(next); }
  const yLife = 395;
  const xStart = 210;
  const step = 85;
  for (let i=0;i<life.length;i++){
    const x = xStart + i*step;
    halo(svg,x,yLife,18,"portraitHalo");
    text(svg, x, yLife, life[i], "num small");
    if (i>0) line(svg, x - step/2, yLife-18, x - step/2, yLife+18, "sep");
  }
  const sumAllDigits = digits.reduce((a,b)=>a+b,0);
  const S = reduce1(sumAllDigits);
  const ages = [36 - S, 36 - S + 9, 36 - S + 18];
  let ageIndex = 0;
  for (let i=2;i<life.length;i+=2){
    const x = xStart + (i-0.5)*step;
    line(svg, x, yLife+34, x, yLife+66, "sep");
    if (ageIndex < ages.length){ text(svg, x, yLife+86, ages[ageIndex], "ageText"); ageIndex++; }
  }
  const c1 = reduce1(day + month);
  const c2 = reduce1(day + year);
  const c3 = reduce1(c1 + c2);
  const c4 = reduce1(month + year);
  const cycles = [c1,c2,c3,c4];
  const d1 = reduce1(day), m1 = reduce1(month), y1 = reduce1(year);
  const challenges = [reduce1(Math.abs(d1 - m1)), reduce1(Math.abs(d1 - y1)), 0, reduce1(Math.abs(m1 - y1))];
  challenges[2] = reduce1(Math.abs(challenges[0] - challenges[1]));
  const yCycles = 520;
  const xCyclesStart = 300;
  const gap = 160;
  for (let i=0;i<4;i++){
    const x = xCyclesStart + i*gap;
    circle(svg, x, yCycles, 22, "cycleCircle");
    text(svg, x, yCycles, cycles[i], "num small");
    rect(svg, x-22, yCycles+44-22, 44, 44, "challengeSquare");
    text(svg, x, yCycles+44, challenges[i], "num small");
  }
}
document.getElementById("btn").addEventListener("click", render);
document.getElementById("birth").addEventListener("change", render);
</script>
</body>
</html>
